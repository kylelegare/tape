                    - img [ref=e693]
                - paragraph [ref=e695]:
                  - link "Discord" [ref=e696] [cursor=pointer]:
                    - /url: https://discord.com/invite/WVBeWsNXK4
                    - img "Discord" [ref=e697]
                - paragraph [ref=e698]:
                  - strong [ref=e699]: A free, open source, and extensible speech-to-text application that works completely offline.
                - paragraph [ref=e700]: Handy is a cross-platform desktop application that provides simple, privacy-focused speech transcription. Press a shortcut, speak, and have your words appear in any text field. This happens on your own computer without sending any information to the cloud.
                - generic [ref=e701]:
                  - heading "Why Handy?" [level=2] [ref=e702]
                  - 'link "Permalink: Why Handy?" [ref=e703] [cursor=pointer]':
                    - /url: "#why-handy"
                    - img [ref=e704]
                - paragraph [ref=e706]:
                  - text: Handy was created to fill the gap for a truly open source, extensible speech-to-text tool. As stated on
                  - link "handy.computer" [ref=e707] [cursor=pointer]:
                    - /url: https://handy.computer
                  - text: ":"
                - list [ref=e708]:
                  - listitem [ref=e709]:
                    - strong [ref=e710]: Free
                    - text: ": Accessibility tooling belongs in everyone's hands, not behind a paywall"
                  - listitem [ref=e711]:
                    - strong [ref=e712]: Open Source
                    - text: ": Together we can build further. Extend Handy for yourself and contribute to something bigger"
                  - listitem [ref=e713]:
                    - strong [ref=e714]: Private
                    - text: ": Your voice stays on your computer. Get transcriptions without sending audio to the cloud"
                  - listitem [ref=e715]:
                    - strong [ref=e716]: Simple
                    - text: ": One tool, one job. Transcribe what you say and put it into a text box"
                - paragraph [ref=e717]: Handy isn't trying to be the best speech-to-text app—it's trying to be the most forkable one.
