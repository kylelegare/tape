name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Import certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain

      - name: Build
        run: |
          xcodebuild \
            -project Tape.xcodeproj \
            -scheme Tape \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=8UDDXP853Z \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            build

      - name: Strip debug entitlement and re-sign
        run: |
          APP_PATH=$(find build -name "Tape.app" -type d | head -1)
          # Extract current entitlements, remove get-task-allow, re-sign
          codesign -d --entitlements - "$APP_PATH" --xml > entitlements.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :com.apple.security.get-task-allow" entitlements.plist 2>/dev/null || true
          codesign --force --sign "Developer ID Application" --entitlements entitlements.plist --timestamp -o runtime "$APP_PATH"

      - name: Notarize
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          APP_PATH=$(find build -name "Tape.app" -type d | head -1)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" Tape-unsigned.zip
          xcrun notarytool submit Tape-unsigned.zip \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --wait 2>&1 | tee notarize-output.txt
          # If notarization failed, fetch the log before exiting
          if grep -q "Invalid" notarize-output.txt; then
            SUBMISSION_ID=$(grep "id:" notarize-output.txt | head -1 | awk '{print $2}')
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$NOTARIZATION_APPLE_ID" \
              --password "$NOTARIZATION_PASSWORD" \
              --team-id "$NOTARIZATION_TEAM_ID" || true
            exit 1
          fi
          xcrun stapler staple "$APP_PATH"

      - name: Package
        run: |
          APP_PATH=$(find build -name "Tape.app" -type d | head -1)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" Tape.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: Tape.zip
          generate_release_notes: true
