name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project Tape.xcodeproj \
            -scheme Tape \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package
        run: |
          APP_PATH=$(find build -name "Tape.app" -type d | head -1)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" Tape.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: Tape.zip
          generate_release_notes: true
